name: Build Binaries

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: "latest"
      cache-ref:
        required: false
        type: string
        default: "cache"
    secrets:
      DOCKER_TOKEN:
        required: false

jobs:
  linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Update version in Cargo.toml
        if: inputs.version != 'latest'
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ inputs.version }}\"/" Cargo.toml

      - name: Build Linux binaries (AMD64 + ARM64)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: builder
          load: true
          tags: rush-cache-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract binaries
        run: |
          container_id=$(docker create rush-cache-builder:latest)
          docker cp "$container_id:/app/linux/amd64" ./rush-cache-server-x64
          docker cp "$container_id:/app/linux/arm64" ./rush-cache-server-arm64
          docker rm "$container_id"
          chmod +x ./rush-cache-server-x64 ./rush-cache-server-arm64

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: linux-binaries
          path: |
            rush-cache-server-x64
            rush-cache-server-arm64
