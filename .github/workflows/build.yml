name: Build

on:
  pull_request:

jobs:
  build:
    name: Build Binaries
    uses: ./.github/workflows/build-binaries.yml
    secrets:
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

  collect:
    name: Collect Artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-binaries"
          merge-multiple: true
          path: binaries

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: binaries/
